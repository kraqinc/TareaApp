name: Build ProfeLoop APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.1/gradle/wrapper/gradle-wrapper.jar"

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/ProfeLoop-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfeLoop-debug
          path: app/build/outputs/apk/debug/ProfeLoop-debug.apk
          retention-days: 30

      - name: Create Release with APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ProfeLoop v${{ github.run_number }}"
          body: |
            ## Descarga el APK e instálalo en tu Android.
            > Activa "Instalar de fuentes desconocidas" en Ajustes si es necesario.
          files: app/build/outputs/apk/debug/ProfeLoop-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
